name: Deploy

on:
  push:
    branches: [main]

jobs:
  checks:
    uses: ./.github/workflows/pr-check.yml

  build:
    needs: [checks]
    runs-on: ubuntu-latest
    outputs:
      image_sha: ${{ steps.build-push.outputs.image_sha}}
    steps:
      - uses: actions/checkout@v4

      - name: Вход в Docker hub
        run: docker login -u ${{ secrets.DOCKER_USER }} -p ${{ secrets.DOCKER_PASS }}

      - name: Build and Push образа
        id: build-push
        env:
          IMAGE_SHA: ${{ secrets.DOCKER_USER }}/backend:sha-${{ github.sha }}
          IMAGE_LATEST: ${{ secrets.DOCKER_USER }}/backend:latest
        run: |
          docker build -t $IMAGE_SHA -t $IMAGE_LATEST . 
          docker push $IMAGE_SHA
          docker push $IMAGE_LATEST
          echo "image_sha=$IMAGE_SHA" >> $GITHUB_OUTPUT
          

  deploy:
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - name: Debug outputs
        run: echo "image_sha=${{ needs.build.outputs.image_sha }}"  # ← покажет пустое или нет

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/myapp
            
            # Обновляем DOCKER_IMAGE в .env на конкретный SHA коммита
            sed -i "s|DOCKER_IMAGE=.*|DOCKER_IMAGE=${{ needs.build.outputs.image_sha  }}|" .env
            
            docker compose up -d --no-deps backend
           

  notify:
    needs: [checks, deploy, build]
    if: always()
    uses:  ./.github/workflows/notify.yaml
